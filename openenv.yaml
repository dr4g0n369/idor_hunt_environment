spec_version: 1
name: idor_hunt_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: idor_horizontal
    name: "Horizontal IDOR (Orders)"
    description: "Find horizontal IDOR vulnerabilities — access other users' orders by manipulating order IDs"
    difficulty: easy
    max_steps: 15

  - id: idor_documents
    name: "Horizontal IDOR (Documents)"
    description: "Find IDOR in the documents endpoint — access other users' documents, especially confidential ones"
    difficulty: easy
    max_steps: 15

  - id: privesc
    name: "Privilege Escalation"
    description: "Find vertical privilege escalation — access manager/admin restricted endpoints as a lower-privileged user"
    difficulty: medium
    max_steps: 20

  - id: access_control_coverage
    name: "Access Control Coverage"
    description: "Systematically test access controls across all endpoints — find IDOR and privilege escalation vulnerabilities across the full API surface"
    difficulty: hard
    max_steps: 30
