spec_version: 1
name: idor_hunt_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: idor_horizontal
    name: "Horizontal IDOR"
    description: "Find horizontal IDOR vulnerabilities — access other users' resources at the same privilege level"
    difficulty: easy
    max_steps: 15

  - id: privesc
    name: "Privilege Escalation"
    description: "Find vertical privilege escalation — access manager/admin restricted endpoints as a lower-privileged user"
    difficulty: medium
    max_steps: 20

  - id: full_audit
    name: "Full Access Control Audit"
    description: "Find all broken access control: horizontal IDOR and vertical privilege escalation across all endpoints"
    difficulty: hard
    max_steps: 30
